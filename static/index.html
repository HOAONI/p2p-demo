<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Libp2p 节点管理器</title>
    <link rel="stylesheet" href="./index.css">
</head>
<body>
<!-- 左侧导航栏 -->
<div class="sidebar">
    <h2>导航栏</h2>
    <button data-target="node-management">节点管理</button>
    <button data-target="file-management">文件管理</button>
    <button data-target="real-time-chat">实时聊天</button>
    <button data-target="nodes-search">节点搜寻</button>
</div>

<!-- 主内容区域 -->
<div class="main-content">
    <!-- 节点管理模块 -->
    <div id="node-management" class="module active">
        <h2>节点管理</h2>
        <form class="node-form">
            <div class="form-group">
                <label>节点名称：</label>
                <input type="text" class="node-input" name="nodeName" placeholder="请输入节点名称" required>
            </div>
            <button type="submit" class="btn">创建节点</button>
        </form>
        <p class="response"></p>
        <h2>现有节点</h2>
        <ul id="node-list" class="node-list"></ul>
        <!--        <p class="response"></p>-->
    </div>

    <!-- 文件管理模块 -->
    <div id="file-management" class="module hidden">
        <div class="file-upload-div">
            <h3>文件上传</h3>
            <select id="my-nodes-fileManage"></select>
            <form class="file-upload-form" enctype="multipart/form-data">
                <!-- 隐藏的文件输入 -->
                <input type="file" id="file-input" name="file">
                <!-- 自定义按钮 -->
                <label for="file-input" class="custom-file-label">选择文件</label>
                <!-- 上传按钮 -->
                <button type="submit" class="upload-btn">上传</button>
            </form>
        </div>
        <ul id="file-node-list" class="node-list"></ul>
        <div class="file-download-div">
            <h3>文件下载</h3>
            <select id="my-nodes-fileManage-download"></select>
            <!--            <form class="file-download-form">-->
            <!--                <input type="file" id="file-download">-->
            <!--                <button type="button" class="download-btn">下载文件</button>-->
            <!--            </form>-->
            <button type="button" class="refresh-file-list-btn">刷新列表</button>
            <ul class="file-download-list"></ul>
        </div>
    </div>

    <!-- 实时聊天模块 -->
    <div id="real-time-chat" class="module hidden">
        <h2>实时聊天</h2>
        <form class="node-connect-form">
            <label>请选择你的节点：</label>
            <select id="my-nodes"></select>
            <br>
            <label>请输入要连接的节点 ID</label>
            <input type="text" class="node-id" placeholder="请输入..." required>
            <button type="submit" class="node-connect">连接</button>
        </form>
        <p class="warn"></p>
        <form class="refresh">
            <textarea readonly id="read-text"></textarea>
            <button class="refresh-btn">刷新</button>
        </form>

        <form class="message">
            <textarea id="chat-input" rows="4" placeholder="输入消息..."></textarea>
            <button class="btn" id="send-message">发送</button>
        </form>

        <div id="chat-log" style="margin-top: 20px;"></div>
    </div>

    <!-- 节点搜寻模块-->
    <div id="nodes-search" class="module hidden">
        <h2>节点搜寻</h2>
        <form class="nodes-search-form">
            <button class="nodes-search-btn">查询</button>
        </form>
        <h2>存在节点</h2>
        <ul id="nodes-exist-list" class="nodes-exist-list"></ul>
    </div>
</div>

<script src="index.js"></script>
</body>
</html>
